version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: game_rpg_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: game_rpg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword   
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
